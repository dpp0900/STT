services:
  plaude-stt:
    build:
      context: .
    image: plaude-stt:local
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:-}
      PORT: ${APP_PORT:-3000}
      PLAUD_OAUTH_LOOPBACK_HOST: ${PLAUD_OAUTH_LOOPBACK_HOST:-0.0.0.0}
    volumes:
      - plaude-data:/app/data

volumes:
  plaude-data:
