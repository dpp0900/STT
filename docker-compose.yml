services:
  plaude-stt:
    build:
      context: .
    image: plaude-stt:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:-}
      PLAUD_OAUTH_LOOPBACK_HOST: ${PLAUD_OAUTH_LOOPBACK_HOST:-0.0.0.0}
    ports:
      - "${APP_PORT:-3000}:3000"
      - "127.0.0.1:${PLAUD_OAUTH_LOOPBACK_PORT:-8199}:8199"
    volumes:
      - plaude-data:/app/data

volumes:
  plaude-data:
