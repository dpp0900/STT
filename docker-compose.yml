services:
  openclaw-loopback:
    image: alpine/socat:latest
    restart: unless-stopped
    network_mode: host
    command:
      - "TCP-LISTEN:${OPENCLAW_PROXY_PORT:-18790},bind=${OPENCLAW_PROXY_BIND:-172.17.0.1},fork,reuseaddr"
      - "TCP:127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}"

  plaude-stt:
    build:
      context: .
    image: plaude-stt:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:-}
      PLAUD_OAUTH_LOOPBACK_HOST: ${PLAUD_OAUTH_LOOPBACK_HOST:-0.0.0.0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-3000}:3000"
      - "127.0.0.1:${PLAUD_OAUTH_LOOPBACK_PORT:-8199}:8199"
    volumes:
      - plaude-data:/app/data

volumes:
  plaude-data:
